<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LILY // Sistema Cognitivo</title>
    
    <script src="https://unpkg.com/brain.js"></script>
    
    <style>
        /* =========================================
           GENÉTICA DA LILY (CSS PURO + VARIÁVEIS)
           ========================================= */
        #dna-container {
            margin-bottom: 40px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #dna {
            display: flex;
            gap: 8px;
            perspective: 1000px;
        }

        #dna div {
            width: 2px;
            height: 40px;
            background-color: #333;
            position: relative;
            transform-style: preserve-3d;
            /* A variável --delay será injetada pelo script abaixo */
            animation: rotation 3s linear infinite reverse;
            animation-delay: var(--delay);
        }

        #dna div::before, 
        #dna div::after {
            content: "";
            position: absolute;
            height: 10px;
            left: -4px;
            right: -4px;
            background-color: #ffffff;
            border-radius: 5px;
            animation: rotation 3s linear infinite reverse;
            animation-delay: var(--delay);
            z-index: 1;
        }

        #dna div::before { top: -10px; }
        #dna div::after { bottom: -10px; }

        @keyframes rotation {
            from { transform: rotateX(0deg); }
            to { transform: rotateX(359deg); }
        }

        /* =========================================
           ESTILOS DO TERMINAL
           ========================================= */
        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #terminal {
            width: 80%;
            max-width: 600px;
            height: 50vh;
            background-color: #0a0a0a;
            border: 1px solid #333;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.02);
        }
        .message { margin-bottom: 10px; }
        .user { color: #888; }
        .lily { color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.3); }
        .system { color: #444; font-style: italic; }
        
        #controls {
            display: flex;
            gap: 10px;
            width: 80%;
            max-width: 600px;
            flex-wrap: wrap; /* Permite que os botões extras desçam de linha */
            justify-content: center;
        }
        input {
            flex: 1 1 100%;
            background: #0a0a0a;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            font-family: inherit;
            margin-bottom: 10px;
        }
        input:focus { outline: none; border-color: #666; }
        button {
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
            flex: 1;
        }
        button:hover { background: #222; border-color: #888; }
    </style>
</head>
<body>

    <div id="dna-container">
        <div id="dna">
            <div></div><div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div><div></div>
            <div></div><div></div><div></div><div></div><div></div>
        </div>
    </div>

    <div id="terminal"></div>

    <div id="controls">
        <input type="text" id="userInput" placeholder="Insira o padrão de dados..." autocomplete="off">
        <button id="sendBtn">Processar</button>
        <button id="teachBtn">Injetar Conhecimento</button>
    </div>

    <script>
        document.querySelectorAll('#dna div').forEach((div, index) => {
            // A mesma matemática que você criou: (@i * @rotate-delay - 60)
            const delay = ((index + 1) * 0.1 - 60) + 's';
            div.style.setProperty('--delay', delay);
        });
    </script>

    <script src="app.js"></script>
</body>
</html>
